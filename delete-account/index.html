<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account — Office Reader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            line-height: 1.7;
            color: #1a1a2e;
            background: #f8f9fa;
            padding: 0;
        }
        .header {
            background: linear-gradient(135deg, #c62828, #b71c1c);
            color: white;
            padding: 48px 24px;
            text-align: center;
        }
        .header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .header p { opacity: 0.85; font-size: 0.95rem; }
        .container {
            max-width: 480px;
            margin: -32px auto 48px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px 32px;
        }
        .warning {
            background: #fff3e0;
            border-left: 4px solid #e65100;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .warning p { margin-bottom: 0; color: #e65100; font-size: 0.9rem; }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #3c4043;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus { border-color: #c62828; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-delete {
            background: #c62828;
            color: white;
            margin-bottom: 12px;
        }
        .btn-delete:hover { background: #b71c1c; }
        .btn-delete:disabled {
            background: #e57373;
            cursor: not-allowed;
        }
        .btn-cancel {
            background: #f5f5f5;
            color: #3c4043;
        }
        .btn-cancel:hover { background: #e0e0e0; }
        .status {
            text-align: center;
            padding: 16px;
            border-radius: 10px;
            margin-top: 16px;
            font-size: 0.95rem;
            display: none;
        }
        .status.success { display: block; background: #e8f5e9; color: #2e7d32; }
        .status.error { display: block; background: #ffebee; color: #c62828; }
        .status.loading { display: block; background: #e3f2fd; color: #1565c0; }
        .footer {
            text-align: center;
            padding: 24px;
            color: #80868b;
            font-size: 0.85rem;
        }
        a { color: #1a73e8; text-decoration: none; }
        a:hover { text-decoration: underline; }
        @media (max-width: 600px) {
            .container { margin: -16px 12px 32px; padding: 24px 20px; }
            .header { padding: 32px 16px; }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Delete Account</h1>
    <p>Office Reader — Document Viewer & PDF Tools</p>
</div>

<div class="container">
    <div class="warning">
        <p><strong>Warning:</strong> This will permanently delete all your data including profile, stats, avatar, and leaderboard progress. This action cannot be undone.</p>
    </div>

    <form id="deleteForm" onsubmit="return false;">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">

        <button type="button" class="btn btn-delete" id="deleteBtn">
            Delete My Account
        </button>
        <a href="../"><button type="button" class="btn btn-cancel">Cancel</button></a>
    </form>

    <div id="status" class="status"></div>
</div>

<div class="footer">
    <p>&copy; 2026 TechLead. All rights reserved.</p>
    <p style="margin-top: 8px;">
        <a href="../privacy-policy/">Privacy Policy</a> &middot;
        <a href="../terms/">Terms of Service</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    function _d(s) { return atob(s).split('').reverse().join(''); }
    var sb = window.supabase.createClient(
        _d('b2MuZXNhYmFwdXMudGFxa3RjcWt1bnF6a3djcmNxbmMvLzpzcHR0aA=='),
        _d('UHU4d055dHNfUVBWZi1SQkJxaUZ4YzBBOHJWRFZIdF9lbGJhaHNpbGJ1cF9icw==')
    );

    function showStatus(message, type) {
        var el = document.getElementById('status');
        el.className = 'status ' + type;
        el.textContent = message;
    }

    function setLoading(loading) {
        var btn = document.getElementById('deleteBtn');
        btn.disabled = loading;
        btn.textContent = loading ? 'Deleting...' : 'Delete My Account';
    }

    document.getElementById('deleteBtn').addEventListener('click', async function() {
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        if (!email || !password) {
            showStatus('Please enter both email and password.', 'error');
            return;
        }

        setLoading(true);
        showStatus('Signing in...', 'loading');

        try {
            // 1. Sign in to verify identity
            var authResult = await sb.auth.signInWithPassword({ email: email, password: password });
            if (authResult.error) {
                throw new Error(authResult.error.message);
            }

            var userId = authResult.data.user.id;
            showStatus('Deleting account...', 'loading');

            // 2. Delete avatar from storage via Storage API (best-effort)
            try {
                await sb.storage.from('avatars').remove([userId + '/avatar.jpg']);
            } catch (e) {
                console.warn('Avatar delete failed (may not exist):', e);
            }

            // 3. Call server-side function to delete user_stats, profiles + auth user
            var rpcResult = await sb.rpc('delete_own_account');
            if (rpcResult.error) {
                throw new Error(rpcResult.error.message);
            }

            // 4. Sign out locally (best-effort, auth user already deleted server-side)
            try {
                await sb.auth.signOut();
            } catch (e) {
                console.warn('Sign out failed (expected if auth user already deleted):', e);
            }

            showStatus('Your account data has been deleted successfully. You can close this page.', 'success');
            document.getElementById('deleteForm').style.display = 'none';
        } catch (error) {
            showStatus('Error: ' + error.message, 'error');
            setLoading(false);
        }
    });
})();
</script>

</body>
</html>
